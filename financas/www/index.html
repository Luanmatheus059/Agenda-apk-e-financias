            h('span',{style:{flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},it.desc),
            h('span',{className:'pill'},it.cat||'?')
          )),
          ...prev.saidas.map((it,idx)=>h('div',{className:'prev-row'},
            h('button',{style:{flex:'none',background:'rgba(239,68,68,.2)',color:'#fca5a5',padding:'4px 8px',borderRadius:'6px',fontSize:'10px',fontWeight:'700',border:'none'},on:{click:()=>{
              S.importPreview.entradas.push({...it});
              S.importPreview.saidas.splice(idx,1);
              render();
            }}},'- '+fmt(it.valor)+' ⇄'),
            h('span',{style:{flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},it.desc),
            h('span',{className:'pill'},it.cat||'?')
          ))
          ]
        ) : h('div',{style:{fontSize:'11px',color:'var(--text3)',textAlign:'center',padding:'12px'}},'Selecione um arquivo pra ver o preview'),
        h('div',{className:'row'},
          h('button',{className:'btn btn-o',style:{flex:'1',padding:'12px',opacity:prev?'1':'0.4'},on:{click:()=>{if(prev)commitImport()}}},
            prev?`Importar ${(prev.entradas.length+prev.saidas.length)} transações`:'Importar'),
          h('button',{className:'btn',style:{flex:'1',padding:'12px',background:'var(--bg)',color:'var(--text3)'},on:{click:()=>{S.modal=null;S.importPreview=null;S.importTxt='';S.importFileName='';render()}}},'Cancelar')
        )
      )
    );app.append(md);
  }

  app.append(h('button',{className:'fab',style:{background:'#ef4444'},on:{click:()=>{
    if(confirm('Zerar TODOS os dados?')){S.ent=[];S.sai=[];S.metas=[];S.aquisicao={nome:'',valor:0,mensal:Array(12).fill(0)};
    S.inv=Array.from({length:12},()=>({renda:0,investido:0,onde:''}));save();render()}}}},'🗑'));
}

// ─── Init ───
await initNotif();
render();
await scheduleSmartReminders();

// ─── BOOT 100% AUTOMÁTICO COM AUTO-RETRY ───
// Roda em paralelo: mercado + notícias + análise IA + agendamento
// Auto-retry a cada 30s se algo falhou — usuario NUNCA precisa apertar refresh
(async()=>{
  console.log('🚀 Boot automático iniciando...');

  // Função que tenta carregar com retry automático
  const autoRetry = async (name, fn, isOK)=>{
    let attempts = 0;
    const maxAttempts = 10; // ~5 min de retry
    while(attempts < maxAttempts){
      try{
        await fn();
        if(isOK()){
          console.log(`  ✅ ${name} carregado`);
          render();
          return;
        }
      }catch(e){console.warn(`  ⏳ ${name} tentativa ${attempts+1}:`,e.message)}
      attempts++;
      // Backoff: 3s, 6s, 12s, 30s, 30s, 30s...
      const wait = Math.min(30000, 3000 * Math.pow(2, attempts-1));
      await new Promise(r=>setTimeout(r, wait));
    }
    console.warn(`  ❌ ${name} desistiu após ${maxAttempts} tentativas`);
  };

  // Dispara mercado e notícias em paralelo com auto-retry
  autoRetry('Mercado', ()=>fetchMarket(true), ()=>(S.market.indices||[]).length > 0);
  autoRetry('Notícias', ()=>fetchAllNews(), ()=>(S.news||[]).length > 0);

  // 3. Agendamento (espera mercado)
  setTimeout(async ()=>{
    try{
      const n = await scheduleAggressiveNotifications();
      if(n) console.log('  ✅ '+n+' notificações ILIMITADAS agendadas');
    }catch(e){console.warn('  ❌ Notif:',e.message)}
  }, 3000);

  // 4. DeepSeek IA: se chave configurada, roda análise inicial após 10s
  setTimeout(async ()=>{
    if(S.deepseekKey && S.deepseekKey.length > 10){
      try{
        await callDeepSeek();
        console.log('  ✅ DeepSeek IA: análise inicial completa');
      }catch(e){console.warn('  ❌ DeepSeek:',e.message)}
    }
  }, 10000);
})();

// DeepSeek IA AUTO-COMPLEMENTAR: roda a cada 5 minutos se chave configurada
setInterval(async ()=>{
  if(S.deepseekKey && S.deepseekKey.length > 10 && document.visibilityState==='visible'){
    try{
      await callDeepSeek();
      console.log('🤖 DeepSeek auto-refresh');
    }catch(e){console.warn('DeepSeek auto:',e.message)}
  }
}, 5 * 60 * 1000);

// REAGENDAMENTO PERPÉTUO — a cada 1h enquanto app aberto, reagenda 7 dias frescos
setInterval(async ()=>{
  if(document.visibilityState === 'visible' && S.notifPerm === 'granted'){
    try{
      await fetchMarket(true);
      const n = await scheduleAggressiveNotifications();
      console.log('🔄 Reagendamento perpétuo: '+n+' notif');
    }catch(e){console.warn('reagendar fail',e)}
  }
}, 3600_000); // 1 hora

// Quando app volta ao foreground, reagenda imediato
document.addEventListener('visibilitychange', async ()=>{
  if(document.visibilityState === 'visible' && S.notifPerm === 'granted'){
    try{ await scheduleAggressiveNotifications(); }catch(e){}
  }
});

// Listener: quando user toca em notificação, reagenda no callback
if(isNative && LocalNotifications){
  try{
    LocalNotifications.addListener('localNotificationActionPerformed', async ()=>{
      try{
        await fetchMarket(true);
        await scheduleAggressiveNotifications();
      }catch(e){}
    });
    LocalNotifications.addListener('localNotificationReceived', async ()=>{
      // Re-agenda silenciosamente quando notif dispara
      try{ await scheduleAggressiveNotifications(); }catch(e){}
    });
  }catch(e){}
}

// BancoNotif desativado — aba Bancos removida porque travava o app

if(!isNative && 'serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
