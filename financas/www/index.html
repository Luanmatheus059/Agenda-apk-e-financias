// ANÁLISE TÉCNICA AUTOMÁTICA (sem IA — só matemática)
// Funciona 100% offline após carregar dados, baseado em
// indicadores clássicos usados por traders profissionais
// ═══════════════════════════════════════════════════

async function fetchHistoricalPrices(symbol, range='1y'){
  // Brapi.dev — histórico de preços diários
  try{
    const r = await fetch(`https://brapi.dev/api/quote/${symbol}?range=${range}&interval=1d`);
    if(!r.ok) return [];
    const d = await r.json();
    return (d.results?.[0]?.historicalDataPrice || []).map(x=>x.close).filter(x=>x>0);
  }catch(e){return []}
}

function calcRSI(prices, period=14){
  if(prices.length < period+1) return null;
  let gains=0, losses=0;
  for(let i=1; i<=period; i++){
    const diff = prices[i] - prices[i-1];
    if(diff>0) gains+=diff; else losses-=diff;
  }
  let avgGain = gains/period, avgLoss = losses/period;
  for(let i=period+1; i<prices.length; i++){
    const diff = prices[i] - prices[i-1];
    if(diff>0){
      avgGain = (avgGain*(period-1) + diff)/period;
      avgLoss = (avgLoss*(period-1))/period;
    } else {
      avgGain = (avgGain*(period-1))/period;
      avgLoss = (avgLoss*(period-1) - diff)/period;
    }
  }
  if(avgLoss===0) return 100;
  return 100 - (100/(1 + avgGain/avgLoss));
}

function calcMA(prices, period){
  if(prices.length < period) return null;
  const slice = prices.slice(-period);
  return slice.reduce((a,b)=>a+b,0)/period;
}

function calcVolatility(prices, period=20){
  if(prices.length < period+1) return null;
  const returns = [];
  for(let i=1; i<prices.length; i++) returns.push((prices[i]-prices[i-1])/prices[i-1]);
  const slice = returns.slice(-period);
  const mean = slice.reduce((a,b)=>a+b,0)/slice.length;
  const variance = slice.reduce((s,r)=>s+(r-mean)**2,0)/slice.length;
  return Math.sqrt(variance) * Math.sqrt(252) * 100; // annualized %
}

async function analyzeAsset(symbol){
  const prices = await fetchHistoricalPrices(symbol);
  if(prices.length < 50) return null;
  const last = prices[prices.length-1];
  const rsi = calcRSI(prices);
  const ma9 = calcMA(prices, 9);
  const ma21 = calcMA(prices, 21);
  const ma50 = calcMA(prices, 50);
  const ma200 = calcMA(prices, 200);
  const ma50Prev = calcMA(prices.slice(0,-1), 50);
  const ma200Prev = calcMA(prices.slice(0,-1), 200);
  const vol = calcVolatility(prices);
  // Performance
  const p7 = prices.length>=7 ? ((last/prices[prices.length-7]-1)*100) : null;
  const p30 = prices.length>=30 ? ((last/prices[prices.length-30]-1)*100) : null;
  const p90 = prices.length>=90 ? ((last/prices[prices.length-90]-1)*100) : null;
  // Setups detectados
  const setups = [];
  if(rsi!==null){
    if(rsi<30) setups.push({t:'oversold',emoji:'📈',color:'#22c55e',
      title:'Sobrevendido',
      msg:`RSI ${rsi.toFixed(0)}. Historicamente, RSI<30 marca zona de compra, MAS pode continuar caindo. Confirme com volume + suporte técnico.`});
    if(rsi>70) setups.push({t:'overbought',emoji:'📉',color:'#f59e0b',
      title:'Sobrecomprado',
      msg:`RSI ${rsi.toFixed(0)}. Historicamente, RSI>70 marca zona de realização. Tendências fortes podem continuar — não venda só por isso.`});
  }
  if(ma50 && ma200 && ma50Prev && ma200Prev){
    if(ma50Prev<ma200Prev && ma50>=ma200) setups.push({t:'golden',emoji:'🌟',color:'#22c55e',
      title:'CRUZ DOURADA',
      msg:`MM50 cruzou MM200 pra cima HOJE. Sinal clássico de início de tendência de alta de médio/longo prazo.`});
    if(ma50Prev>ma200Prev && ma50<=ma200) setups.push({t:'death',emoji:'💀',color:'#ef4444',
      title:'CRUZ DA MORTE',
      msg:`MM50 cruzou MM200 pra baixo HOJE. Sinal clássico de início de tendência de baixa. Cautela com posições compradas.`});
  }
  if(ma9 && ma21 && last){
    if(last > ma9 && ma9 > ma21) setups.push({t:'trend-up',emoji:'⬆️',color:'#86efac',
      title:'Tendência de alta curta',
      msg:`Preço > MM9 > MM21. Momentum positivo de curto prazo.`});
    if(last < ma9 && ma9 < ma21) setups.push({t:'trend-down',emoji:'⬇️',color:'#fca5a5',
      title:'Tendência de baixa curta',
      msg:`Preço < MM9 < MM21. Momentum negativo de curto prazo.`});
  }
  if(ma50 && last > ma50*1.15) setups.push({t:'extended',emoji:'⚠️',color:'#f59e0b',
    title:'Esticado',
    msg:`Preço está ${((last/ma50-1)*100).toFixed(0)}% acima da MM50. Risco de correção pra média.`});
  if(ma50 && last < ma50*0.85) setups.push({t:'oversold-ma',emoji:'🔻',color:'#22c55e',
    title:'Distante da média',
    msg:`Preço está ${((last/ma50-1)*100).toFixed(0)}% abaixo da MM50. Pode haver mean reversion.`});
  return {
    symbol, last, rsi, ma9, ma21, ma50, ma200, vol, p7, p30, p90, setups
  };
}

// Calculadora de posição 2% rule (Van Tharp / Mark Douglas)
function calcPositionSize(capital, entry, stop, riskPct){
  const cap = parseFloat(capital)||0;
  const e = parseFloat(entry)||0;
  const s = parseFloat(stop)||0;
  const r = parseFloat(riskPct)||2;
  if(cap<=0 || e<=0 || s<=0) return null;
  const riskAmount = cap * (r/100);
  const riskPerUnit = Math.abs(e - s);
  if(riskPerUnit === 0) return null;
  const size = Math.floor(riskAmount / riskPerUnit);
  const totalCost = size * e;
  return {size, riskAmount, riskPerUnit, totalCost};
}

// Fetch preços da watchlist via Brapi
async function fetchWatchlist(){
  if(!S.watchlist.length) return [];
  try{
    // separa stocks/indices vs crypto vs câmbio
    const stocks=[], cryptos=[], currencies=[];
    for(const sym of S.watchlist){
      if(/^(BTC|ETH|SOL|ADA|XRP|DOGE|BNB|MATIC)$/i.test(sym)) cryptos.push(sym.toUpperCase());
      else if(/^(USD|EUR|GBP|JPY|ARS)-?BRL$|^BRL-?/i.test(sym)) currencies.push(sym.toUpperCase().replace(/-?BRL/i,'-BRL'));

    if(stocks.length){
      try{
        const r=await fetch(`https://brapi.dev/api/quote/${stocks.join(',')}?range=1d`);

      }catch(e){}
    }
    for(const c of cryptos){
      try{
        const r=await fetch(`https://brapi.dev/api/v2/crypto?coin=${c}&currency=BRL`);
        const d=r.ok?await r.json():{};
        const coin=(d.coins||[])[0];
        if(coin) results.push({symbol:c,name:'Cripto '+c,price:coin.regularMarketPrice,chg:coin.regularMarketChangePercent||0,type:'crypto'});
      }catch(e){}

// Estatísticas do diário de operações
function diaryStats(){
  const closed = S.diary.filter(d=>d.exit && d.entry);
  if(!closed.length) return null;
  const ops = closed.map(d=>{
    const e=parseFloat(d.entry), x=parseFloat(d.exit), sz=parseFloat(d.size)||1, st=parseFloat(d.stop)||e;
    const pnl = d.side==='buy' ? (x-e)*sz : (e-x)*sz;
    const risk = Math.abs(e-st)*sz;
    const R = risk>0 ? pnl/risk : 0;
    return {pnl, R, win: pnl>0};
  });
  const wins = ops.filter(o=>o.win).length;
  const losses = ops.filter(o=>!o.win && o.pnl<0).length;
  const winRate = ops.length>0 ? (wins/ops.length*100) : 0;
  const totalPnL = ops.reduce((s,o)=>s+o.pnl,0);
  const avgR = ops.reduce((s,o)=>s+o.R,0)/ops.length;
  const bigWin = Math.max(...ops.map(o=>o.pnl), 0);
  const bigLoss = Math.min(...ops.map(o=>o.pnl), 0);
  // Drawdown simulado (max queda acumulada)
  let acc=0, peak=0, maxDD=0;
  for(const o of ops){ acc+=o.pnl; if(acc>peak)peak=acc; if(peak-acc>maxDD)maxDD=peak-acc; }
  return {total:ops.length, wins, losses, winRate, totalPnL, avgR, bigWin, bigLoss, maxDD};
}

// ─── Recomendação de alocação 50/30/20 + perfil ───
function getAllocationPlan(){
  const tE=tot(S.ent), tS=tot(S.sai), saldo=tE-tS;
  // Disponível mensal estimado
  const disponivel = Math.max(0, saldo);
  // % por perfil (renda fixa / variável / cripto / reserva)
  const perfis = {
    conservador: {fixa:60, variavel:20, cripto:0, reserva:20},
    moderado:    {fixa:40, variavel:35, cripto:5,  reserva:20},
    agressivo:   {fixa:20, variavel:50, cripto:15, reserva:15}
  };
  const p = perfis[S.perfilInv] || perfis.moderado;
  // 50/30/20: 50% necessidades, 30% lazer, 20% investir
  const idealInvestir = Math.round(tE * 0.20);
  const idealNecessidades = Math.round(tE * 0.50);
  const idealLazer = Math.round(tE * 0.30);
  return {
    disponivel,
    perfil: S.perfilInv,
    p,
    idealInvestir,
    idealNecessidades,
    idealLazer,
    realInvestir: tInv(),
    breakdown: {
      'Renda Fixa (Tesouro/CDB)': Math.round(idealInvestir * p.fixa/100),
      'Renda Variável (Ações/FIIs)': Math.round(idealInvestir * p.variavel/100),
      'Cripto (BTC/ETH)': Math.round(idealInvestir * p.cripto/100),
      'Reserva Emergência': Math.round(idealInvestir * p.reserva/100)
    }
  };
}
function tInv(){return S.inv.reduce((s,v)=>s+(parseFloat(v.investido)||0),0)}

// ─── Histórico de saldo (acumulado por dia) ───
function getBalanceHistory(){
  const allTx = [...S.ent.map(e=>({...e, sign:1})), ...S.sai.map(s=>({...s, sign:-1}))];
  // ordena por data
  allTx.sort((a,b)=>{
    const da = parseDateBR(a.data), db = parseDateBR(b.data);
    if(!da || !db) return (a.id||0) - (b.id||0);
    return da - db;
  });
  let acc=0;
  const points=[];
  for(const tx of allTx){
    const v = (parseFloat(tx.valor)||0) * tx.sign;
    acc += v;
    points.push({data: tx.data||'?', valor: acc});
  }
  return points;
}
function parseDateBR(s){
  if(!s) return null;
  const m = String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
}

// ─── Parsers de extrato ───
function parseBRDate(s){
  if(!s) return '';
  // dd/mm/yyyy, dd-mm-yyyy, yyyy-mm-dd, ddmmyyyy
  const t = s.trim();
  let m;
  if((m=t.match(/^(\d{2})\/(\d{2})\/(\d{4})$/))) return `${m[1]}/${m[2]}/${m[3]}`;
  if((m=t.match(/^(\d{2})-(\d{2})-(\d{4})$/))) return `${m[1]}/${m[2]}/${m[3]}`;
  if((m=t.match(/^(\d{4})-(\d{2})-(\d{2})/))) return `${m[3]}/${m[2]}/${m[1]}`;
  if((m=t.match(/^(\d{2})(\d{2})(\d{4})$/))) return `${m[1]}/${m[2]}/${m[3]}`;
  if((m=t.match(/^(\d{4})(\d{2})(\d{2})/))) return `${m[3]}/${m[2]}/${m[1]}`;
  return t;
}
function parseBRMoney(s){
  if(!s) return 0;
  const cleaned = String(s).replace(/[^\d.,\-+]/g,'');
  // formato BR: 1.234,56 → tira pontos, troca vírgula por ponto
  if(cleaned.includes(',')){
    return parseFloat(cleaned.replace(/\./g,'').replace(',','.')) || 0;
  }
  return parseFloat(cleaned) || 0;
}

function parseOFX(text){
  // OFX é XML-like. Extrai todas as <STMTTRN>...</STMTTRN>
  const out = [];
  const txns = text.match(/<STMTTRN>[\s\S]*?<\/STMTTRN>/g) || [];
  for(const t of txns){
    const trnType = ((t.match(/<TRNTYPE>([^<\n\r]+)/i)||[])[1] || '').toUpperCase().trim();
    const dt = (t.match(/<DTPOSTED>([^<\n\r]+)/i)||[])[1] || '';
    const amt = (t.match(/<TRNAMT>([^<\n\r]+)/i)||[])[1] || '0';
    const memo = (t.match(/<MEMO>([^<\n\r]+)/i)||[])[1] || '';
    const name = (t.match(/<NAME>([^<\n\r]+)/i)||[])[1] || '';
    const desc = (name+' '+memo).trim() || trnType || 'Transação';
    const v = parseFloat(amt) || 0;
    if(v===0) continue;
    // OFX TRNTYPE: CREDIT/DEBIT/DEP/PAYMENT/CHECK/XFER/POS/ATM/INT
    let tipo = null;
    if(/CREDIT|DEP|INT|DIV/.test(trnType)) tipo='entrada';
    else if(/DEBIT|PAYMENT|CHECK|ATM|POS/.test(trnType)) tipo='saida';
    else if(v<0) tipo='saida';
    else if(v>0) tipo='entrada';
    out.push({
      data: parseBRDate(dt.slice(0,8)),
      desc: desc.replace(/\s+/g,' ').trim(),
      valor: v,
      tipo
    });
  }
  return out;
}

function parseCSV(text){
  // Multi-section: divide em seções por linhas em branco e parseia cada uma
  const allLines = text.split(/\r?\n/);
  const sections = [];
  let cur = [];
  for(const l of allLines){
    if(l.trim()) cur.push(l);
    else if(cur.length){ sections.push(cur); cur=[]; }
  }
  if(cur.length) sections.push(cur);

  const all = [];
  for(const sec of sections){
    const part = parseCSVSection(sec);
    all.push(...part);
  }
  return all;
}

function parseCSVSection(lines){
  if(!lines.length) return [];
  const sample = lines[0];
  const sep = sample.includes(';') ? ';' : sample.includes('\t') ? '\t' : ',';

  const firstCols = lines[0].split(sep).map(c => c.trim().replace(/^"|"$/g,''));
  // Detecta header (português + inglês: data, descrição, valor, débito, crédito,
  // release_date, transaction_type, transaction_net_amount, amount, name, memo, etc)
  const headerRegex = /^(data|dt|date|descri|hist[oó]r|memo|t[ií]tulo|name|valor|amount|vlr|d[ée]bito|debit|cr[eé]dito|credit|tipo|d\/c|natureza|release_date|posted_date|transaction|operation|net_amount)/i;
  const hasHeader = firstCols.some(c => headerRegex.test(c));

  let idxData=-1, idxDesc=-1, idxValor=-1, idxDeb=-1, idxCred=-1, idxTipo=-1;
  if(hasHeader){
    firstCols.forEach((c,i)=>{
      const cl = c.toLowerCase().trim();
      if(idxData<0 && /^data$|^dt$|^date$|release_date|posted_date|transaction_date|operation_date/.test(cl)) idxData=i;
      else if(idxDesc<0 && /descri|hist[oó]r|memo|t[ií]tulo|^name$|transaction_type|operation_desc/.test(cl)) idxDesc=i;
      else if(/^d[ée]bito|^debit$/.test(cl) && !/credit/.test(cl)) idxDeb=i;
      else if(/^cr[eé]dito|^credit$/.test(cl)) idxCred=i;
      else if(idxValor<0 && /^valor$|^amount$|^vlr$|net_amount|transaction_net_amount|^valor\s*\(/.test(cl)) idxValor=i;
      else if(idxTipo<0 && /^tipo$|^d\/c$|^dc$|^natureza/.test(cl)) idxTipo=i;
    });
  }

  // É uma SEÇÃO DE RESUMO se tiver só Débito+Crédito (sem data + descrição) → skip
  if(hasHeader && (idxDeb>=0 || idxCred>=0) && idxData<0 && idxDesc<0){
    return [];
  }

  const start = hasHeader ? 1 : 0;
  const out = [];

  for(let i=start; i<lines.length; i++){
    const cols = lines[i].split(sep).map(c => c.trim().replace(/^"|"$/g,''));
    if(cols.length < 2) continue;

    let data='', desc='', valor=0, tipo=null;

    if(idxData>=0 || idxDesc>=0 || idxValor>=0 || idxDeb>=0 || idxCred>=0){
      data = idxData>=0 ? parseBRDate(cols[idxData]) : parseBRDate(cols[0]);
      desc = idxDesc>=0 ? cols[idxDesc] : (cols[1] || '');
      if(idxDeb>=0 && idxCred>=0){
        const d = parseBRMoney(cols[idxDeb]);
        const c = parseBRMoney(cols[idxCred]);
        if(d>0){ valor = d; tipo='saida'; }
        else if(c>0){ valor = c; tipo='entrada'; }
      } else if(idxValor>=0){
        valor = parseBRMoney(cols[idxValor]);
      } else {
        valor = parseBRMoney(cols[cols.length-1]);
      }
      if(idxTipo>=0 && !tipo){
        const t = (cols[idxTipo]||'').toLowerCase().trim();
        if(t==='d' || t==='débito' || t==='debito' || t==='dr' || t==='-') tipo='saida';
        else if(t==='c' || t==='crédito' || t==='credito' || t==='cr' || t==='+') tipo='entrada';
      }
    } else {
      if(cols.length >= 3){
        data = parseBRDate(cols[0]);
        valor = parseBRMoney(cols[cols.length-1]);
        desc = cols.slice(1, cols.length-1).join(' - ').trim();
      } else {
        data = parseBRDate(cols[0]);
        desc = '';
        valor = parseBRMoney(cols[1]);
      }
    }

    if(!tipo) tipo = inferTypeFromRow(cols);
    if(!desc || /^[A-Z_]+$/.test(desc)) desc = 'Transação';
    // Skip linhas com valor inválido ou enorme (suspeito de ser ID)
    if(valor === 0 || Math.abs(valor) > 10_000_000) continue;
    // Skip se desc parece header
    if(/^(release_date|transaction|reference|description|amount|valor|débito|debito|crédito|credito|initial|final|partial|balance)$/i.test(desc)) continue;
    out.push({data, desc, valor, tipo});
  }
  return out;
}

function parseExtrato(text, filename){
  const t = (text||'').trim();
  if(!t) return [];
  // OFX detection
  if(/<OFX>|<STMTTRN>/i.test(t) || (filename && /\.ofx$/i.test(filename))){
    return parseOFX(t);
  }
  return parseCSV(t);
}

// ─── XLSX parser (SheetJS) ───
function parseXLSX(arrayBuffer){
  if(typeof XLSX==='undefined'){ showToast('SheetJS não carregou (sem internet?)'); return []; }
  try{
    const wb = XLSX.read(arrayBuffer, {type:'array', cellDates:true});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, dateNF:'dd/mm/yyyy'});
    if(!rows.length) return [];

    // Detecta cabeçalho na primeira linha que tem texto descritivo
    let idxData=-1, idxDesc=-1, idxValor=-1, idxDeb=-1, idxCred=-1, idxTipo=-1;
    let headerRow=-1;
    for(let i=0;i<Math.min(5,rows.length);i++){
      const r = rows[i] || [];
      let scoreD=-1, scoreDes=-1, scoreV=-1;
      r.forEach((c,j)=>{
        const cl = String(c||'').toLowerCase();
        if(/^data|^dt/.test(cl)) scoreD=j;
        if(/descri|hist[oó]r|memo|t[ií]tulo/.test(cl)) scoreDes=j;
        if(/^valor$|^amount|^vlr$/.test(cl)) scoreV=j;
        if(/d[ée]bito/.test(cl)) idxDeb=j;
        if(/cr[eé]dito/.test(cl)) idxCred=j;
        if(/^tipo$|^d\/c$|^dc$|^natureza/.test(cl)) idxTipo=j;
      });
      if(scoreD>=0 || scoreDes>=0 || idxDeb>=0 || idxCred>=0){
        idxData=scoreD; idxDesc=scoreDes; idxValor=scoreV; headerRow=i; break;
      }
    }

    const out=[];
    const startRow = headerRow>=0 ? headerRow+1 : 0;
    for(let i=startRow;i<rows.length;i++){
      const r = rows[i];
      if(!r || !r.length) continue;
      // Pula linhas que não têm número
      const hasNums = r.some(c => typeof c==='number' || /\d/.test(String(c||'')));
      if(!hasNums) continue;

      let data='', desc='', valor=0, tipo=null;

      if(headerRow>=0 && (idxData>=0 || idxDesc>=0 || idxDeb>=0 || idxCred>=0 || idxValor>=0)){
        data = parseBRDate(String(r[idxData>=0?idxData:0]||''));
        desc = String(r[idxDesc>=0?idxDesc:1]||'');
        if(idxDeb>=0 && idxCred>=0){
          const d = parseBRMoney(r[idxDeb]);
          const c = parseBRMoney(r[idxCred]);
          if(d>0){ valor = d; tipo='saida'; }
          else if(c>0){ valor = c; tipo='entrada'; }
        } else if(idxValor>=0){
          valor = parseBRMoney(r[idxValor]);
        } else {
          valor = parseBRMoney(r[r.length-1]);
        }
        if(idxTipo>=0 && !tipo){
          const t = String(r[idxTipo]||'').toLowerCase().trim();
          if(t==='d' || t==='débito' || t==='debito' || t==='dr' || t==='-') tipo='saida';
          else if(t==='c' || t==='crédito' || t==='credito' || t==='cr' || t==='+') tipo='entrada';
        }
      } else {
        // Sem header — heurística genérica
        if(r.length>=3){
          data = parseBRDate(String(r[0]||''));
          desc = String(r[1]||'');
          valor = parseBRMoney(r[r.length-1]);
        }
      }

      if(!tipo) tipo = inferTypeFromRow(r);
      if(!desc) desc='Transação';
      if(valor!==0) out.push({data, desc:desc.trim(), valor, tipo});
    }
    return out;
  }catch(e){ console.error(e); showToast('Erro lendo .xlsx'); return []; }
}

// ─── PDF parser (pdf.js) — best-effort ───
async function parsePDF(arrayBuffer){
  if(typeof pdfjsLib==='undefined'){ showToast('pdf.js não carregou'); return []; }
  try{
    const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    let fullText='';
    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      const lineMap = {};
      // agrupa por Y
      for(const it of tc.items){
        const y = Math.round(it.transform[5]);
        if(!lineMap[y]) lineMap[y]=[];
        lineMap[y].push({x:it.transform[4], s:it.str});
      }
      const ys = Object.keys(lineMap).map(Number).sort((a,b)=>b-a);
      for(const y of ys){
        const line = lineMap[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ');
        fullText += line + '\n';
      }
    }
    // tenta extrair linhas no formato: data ... descrição ... valor
    const out=[];
    const lines = fullText.split('\n');
    const reLine = /(\d{2}\/\d{2}\/\d{2,4})\s+(.+?)\s+(-?R?\$?\s*[\d.,]+)\s*$/;
    const reDateOnly = /^\s*(\d{2}\/\d{2}\/\d{2,4})\b/;
    const reAmount = /(-?\s*R?\$?\s*[\d.,]+)\s*(?:C|D)?\s*$/i;
    for(const raw of lines){
      const l = raw.trim();
      if(!l) continue;
      const m = l.match(reLine);
      if(m){
        const data = parseBRDate(m[1]);
        const valor = parseBRMoney(m[3]);
        const desc = m[2].trim();
        if(valor!==0 && desc.length>1) out.push({data, desc, valor});
      }
    }
    if(!out.length){
      // fallback: avisa que não conseguiu
      showToast('Não consegui extrair transações deste PDF — formato não reconhecido. Tente CSV/OFX/XLSX.');
    }
    return out;
  }catch(e){ console.error(e); showToast('Erro lendo PDF'); return []; }
}

function trelloCardToTx(card){
  // tenta achar valor monetário no título ou descrição
  const all = (card.name||'') + ' ' + (card.desc||'');
  const m = all.match(/R\$\s*([\d.,]+)/) || all.match(/([\d.,]+)\s*reais/i) || all.match(/\b(\d+[.,]\d{2})\b/);
  if(!m) return null;
  const valor = parseBRMoney(m[1]);
  if(valor<=0) return null;
  // heurística: se tem palavras de entrada usa entrada, senão saída
  const isIn = /receb|entrada|salário|salario|venda|paga(?:mento)?\s+rec/i.test(all);
  return {
    data: card.due ? parseBRDate(card.due.slice(0,10)) : new Date().toLocaleDateString('pt-BR'),
    desc: card.name,
    valor: isIn ? Math.abs(valor) : -Math.abs(valor)
  };
}

function classifyImport(items){
  const entradas=[], saidas=[];
  for(const it of items){
    // Direção determinada na hora do parse (it.tipo='entrada'|'saida'|null)
    // Fallback: sinal do valor + inferência por descrição
    let tipo = it.tipo;
    if(!tipo){
      tipo = inferTypeFromDesc(it.desc);
    }
    if(!tipo){
      tipo = (it.valor < 0) ? 'saida' : 'entrada';
    }
    const v = Math.abs(it.valor);
    if(v === 0) continue;
    if(tipo === 'entrada'){
      entradas.push({...it, valor: v, cat: autoCat(it.desc, 'entrada')});
    } else {
      saidas.push({...it, valor: v, cat: autoCat(it.desc, 'saida')});
    }
  }
  return {entradas, saidas};
}

// Inferência de tipo (entrada/saida) baseada em palavras-chave da descrição
const SAIDA_KW = ['pagamento','pago','débito','debito','compra','saque','transferência enviada','transferencia enviada','pix enviado','ted enviada','doc enviado','tarifa','iof','imposto','desconto','fatura','boleto pago','mensalidade','aluguel','conta de','condomínio','condominio','luz','energia','água','agua','gás','gas','internet','assinatura','netflix','spotify','disney','uber','99','ifood','mercado','farmácia','farmacia','posto','gasolina'];
const ENTRADA_KW = ['recebido','recebimento','crédito','credito','salário','salario','depósito','deposito','pix recebido','transferência recebida','transferencia recebida','rendimento','dividendo','reembolso','estorno','devolução','devolucao','holerite','folha de pagamento','pagamento recebido'];

function inferTypeFromDesc(desc){
  if(!desc) return null;
  const d = String(desc).toLowerCase();
  for(const kw of SAIDA_KW) if(d.includes(kw)) return 'saida';
  for(const kw of ENTRADA_KW) if(d.includes(kw)) return 'entrada';
  return null;
}

// Inferência baseada em colunas auxiliares (Tipo, D/C, Débito/Crédito)
function inferTypeFromRow(cells){
  for(const v of cells){
    const s = String(v||'').trim().toLowerCase();
    if(s==='d' || s==='débito' || s==='debito' || s==='dr' || s==='-') return 'saida';
    if(s==='c' || s==='crédito' || s==='credito' || s==='cr' || s==='+') return 'entrada';
  }
  return null;
}

function pickFile(){
  const fi = document.getElementById('fileInput');
  fi.value = '';
  fi.onchange = async (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    S.importFileName = f.name;
    const ext = f.name.toLowerCase().split('.').pop();
    let items=[];
    showToast('Processando '+f.name+'...');
    try{
      if(ext==='xlsx' || ext==='xls'){
        const buf = await f.arrayBuffer();
        items = parseXLSX(buf);
      } else if(ext==='pdf'){
        const buf = await f.arrayBuffer();
        items = await parsePDF(buf);
      } else {
        // text-based: csv, ofx, txt, qif
        const text = await f.text();
        S.importTxt = text;
        items = parseExtrato(text, f.name);
      }
    }catch(err){
      console.error(err);
      showToast('Erro lendo arquivo: '+err.message);
    }
    S.importPreview = items.length ? classifyImport(items) : null;
    if(items.length) showToast(`${items.length} transações detectadas`);
    else showToast('Nenhuma transação encontrada no arquivo');
    render();
  };
  fi.click();
}

async function syncFromTrello(){
  const {key,token,boardId} = S.trello || {};
  if(!key || !token || !boardId){ showToast('Configure Trello primeiro'); return; }
  showToast('Buscando cards Trello...');
  const cards = await fetchTrelloCards(key, token, boardId);
  const items=[];
  for(const c of cards){
    const tx = trelloCardToTx(c);
    if(tx) items.push(tx);
  }
  if(items.length){
    S.importPreview = classifyImport(items);
    S.importFileName = `Trello (${items.length} cards com valor)`;
    showToast(`${items.length} cards com valor encontrados`);
  } else {
    showToast(`${cards.length} cards lidos, mas nenhum com valor monetário`);
  }
  render();
}

function commitImport(){
  if(!S.importPreview) return;
  let ne=0, ns=0;
  for(const it of S.importPreview.entradas){
    S.ent.push({desc:it.desc,data:it.data,cat:it.cat||'',valor:String(it.valor),obs:'Importado',id:++uid}); ne++;
  }
  for(const it of S.importPreview.saidas){
    S.sai.push({desc:it.desc,data:it.data,cat:it.cat||'',valor:String(it.valor),forma:'',status:'Pago',obs:'Importado',id:++uid}); ns++;
  }
  S.importPreview=null; S.importTxt=''; S.importFileName=''; S.modal=null;
  save(); render();
  showToast(`${ne} entrada(s) e ${ns} saída(s) importadas ✅`);
}

function h(t,p,...c){
  const el=document.createElement(t);
  if(p)Object.entries(p).forEach(([k,v])=>{
    if(k==='on'&&typeof v==='object')Object.entries(v).forEach(([e,fn])=>el.addEventListener(e,fn));
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  c.flat(9).forEach(x=>{if(x!=null)el.append(typeof x==='string'||typeof x==='number'?document.createTextNode(x):x)});
  return el;
}
function inp(v,ph,fn,ex={}){return h('input',{value:v||'',placeholder:ph,...ex,on:{input:e=>fn(e.target.value),change:e=>fn(e.target.value)}})}
function sel(v,opts,fn,ph='—'){const s=h('select',{on:{change:e=>fn(e.target.value)}});s.append(h('option',{value:''},ph));opts.forEach(o=>{const op=h('option',{value:o},o);if(o===v)op.selected=true;s.append(op)});return s}

// ─── Sugestões inteligentes ───
function buildSuggestions(){
  const tE=tot(S.ent), tS=tot(S.sai), saldo=tE-tS;
  const out=[];
  // saldo positivo → sugere investimento
  if(saldo > 0){
    const inv = Math.round(saldo * (S.invPct||10) / 100);
    out.push({
      icon:'📈', color:'#a855f7',
      title:'Invista parte do seu saldo',
      body:`Você tem ${fmt(saldo)} de saldo positivo. Sugerimos investir ${fmt(inv)} (${S.invPct}% do saldo).`
    });
  }
  // reserva de emergência
  const mediaDespesaMensal = tS > 0 ? tS : 0;
  if(mediaDespesaMensal > 0){
    const reserva = Math.round(mediaDespesaMensal * 6);
    out.push({
      icon:'🏦', color:'#22c55e',
      title:'Reserva de emergência',
      body:`Sugestão: ter ${fmt(reserva)} guardado (6× suas despesas atuais de ${fmt(mediaDespesaMensal)}).`
    });
  }
  // aquisição em andamento
  if(S.aquisicao.nome && S.aquisicao.valor>0){
    const aqAcum=S.aquisicao.mensal.reduce((s,v)=>s+(parseFloat(v)||0),0);
    const restante = Math.max(0, S.aquisicao.valor - aqAcum);
    if(restante>0){
      const mesesRestantes = 12 - S.aquisicao.mensal.findIndex((v,i,arr)=>arr.slice(i+1).every(x=>!x||x===0)) - 1;
      const meses = Math.max(1, mesesRestantes);
      const porMes = Math.round(restante / meses);
      out.push({
        icon:'🎯', color:'#f59e0b',
        title:`Faltam ${fmt(restante)} pra "${S.aquisicao.nome}"`,
        body:`Em ${meses} mês(es) restantes, guarde cerca de ${fmt(porMes)}/mês pra conseguir.`
      });
    }
  }
  // metas perto de alcançar
  for(const m of S.metas){
    const real = parseFloat(m.valorReal)||0;
    const meta = parseFloat(m.valorMeta)||0;
    if(meta>0 && real>0 && real>=meta*0.8 && real<meta){
      out.push({
        icon:'🏆', color:'#22c55e',
        title:`"${m.meta}" está quase lá!`,
        body:`Faltam ${fmt(meta-real)} (${pct(real,meta)}% concluído).`
      });
    }
  }
  // gasto em categoria muito alto
  if(tS>0){
    const porCat = {};
    for(const s of S.sai) porCat[s.cat||'Outros'] = (porCat[s.cat||'Outros']||0) + (parseFloat(s.valor)||0);
    const sorted = Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
    if(sorted.length && sorted[0][1] > tS*0.4){
      out.push({
        icon:'⚠️', color:'#ef4444',
        title:`Gasto concentrado em "${sorted[0][0]}"`,
        body:`Essa categoria representa ${pct(sorted[0][1], tS)}% das suas despesas (${fmt(sorted[0][1])}). Vale revisar.`
      });
    }
  }
  // nenhuma sugestão? motivacional
  if(out.length===0){
    out.push({
      icon:'💡', color:'#3b82f6',
      title:'Comece registrando suas movimentações',
      body:'Quanto mais dados você lança, mais sugestões inteligentes eu te dou.'
    });
  }
  return out;
}

        h('p',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'10px',lineHeight:'1.5'}},
          'Importe de 4 fontes diferentes — todas geram preview antes de confirmar.'
        ),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',fontWeight:'700',marginBottom:'4px'}},'1️⃣ ARQUIVO LOCAL'),
        h('div',{className:'file-drop',on:{click:pickFile}},
          h('div',{style:{fontSize:'30px',marginBottom:'6px'}},'📁'),
          h('div',{style:{fontWeight:'700',marginBottom:'2px'}},S.importFileName && !S.importFileName.startsWith('Google') && !S.importFileName.startsWith('Trello')?S.importFileName:'Escolher arquivo do celular'),
          h('div',{style:{fontSize:'11px',color:'var(--text3)'}},'CSV · OFX · TXT · QIF · XLSX · PDF')
        ),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',fontWeight:'700',margin:'12px 0 4px'}},'2️⃣ GOOGLE SHEETS'),
        h('div',{className:'tip',style:{flexDirection:'column',alignItems:'stretch'}},
          h('div',{style:{fontSize:'11px',color:'var(--text3)',marginBottom:'6px'}},
            'Na sua planilha: Arquivo → Compartilhar → Publicar na web → Toda planilha → CSV → Publicar. Cola a URL aqui:'
          ),
          inp(S.sheetsURL,'https://docs.google.com/spreadsheets/d/.../pub?output=csv',v=>{S.sheetsURL=v;save()},{style:{fontSize:'11px',marginBottom:'6px'}}),
          h('button',{className:'btn btn-b',style:{padding:'8px',fontSize:'12px'},on:{click:syncFromSheets}},'🔄 Sincronizar Sheets agora')
        ),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',fontWeight:'700',margin:'12px 0 4px'}},'3️⃣ TRELLO'),
        h('div',{className:'tip',style:{flexDirection:'column',alignItems:'stretch'}},
          h('div',{style:{fontSize:'11px',color:'var(--text3)',marginBottom:'6px'}},
            'Pega Key e Token em ',h('a',{href:'https://trello.com/app-key',target:'_blank',style:{color:'#3b82f6'}},'trello.com/app-key'),
            '. Board ID é a parte depois de /b/ na URL do quadro. Cards com R$X no título/desc viram transações.'
          ),
          inp(S.trello.key,'Key',v=>{S.trello={...S.trello,key:v};save()},{style:{fontSize:'11px',marginBottom:'4px'}}),
          inp(S.trello.token,'Token',v=>{S.trello={...S.trello,token:v};save()},{style:{fontSize:'11px',marginBottom:'4px'}}),
          inp(S.trello.boardId,'Board ID (ex: AbC123De)',v=>{S.trello={...S.trello,boardId:v};save()},{style:{fontSize:'11px',marginBottom:'6px'}}),
          h('button',{className:'btn btn-b',style:{padding:'8px',fontSize:'12px'},on:{click:syncFromTrello}},'🔄 Importar cards do Trello')
        ),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',fontWeight:'700',margin:'12px 0 4px'}},'4️⃣ COLAR TEXTO'),
        h('details',null,
          h('summary',{style:{fontSize:'12px',color:'var(--text3)',cursor:'pointer',marginBottom:'8px'}},'Mostrar área de texto'),
          h('textarea',{placeholder:'10/01/2026;Salário;5000\n12/01/2026;Mercado;-350',style:{marginBottom:'10px'},on:{input:e=>{
            S.importTxt=e.target.value;
            const items = parseExtrato(e.target.value, '');
            S.importPreview = items.length ? classifyImport(items) : null;
            render();
          }}})
        ),
        prev ? h('div',{style:{background:'var(--card)',borderRadius:'12px',padding:'10px',marginTop:'10px',marginBottom:'10px',maxHeight:'320px',overflowY:'auto'}},
          h('div',{style:{fontSize:'13px',fontWeight:'700',marginBottom:'4px'}},
            '📋 ',(prev.entradas.length+prev.saidas.length)+' transações detectadas'
          ),
          h('div',{style:{fontSize:'11px',color:'var(--text3)',marginBottom:'8px'}},
            'Toque no botão ⇄ pra trocar entrada ↔ saída se o app errou.'
          ),
          h('div',{style:{display:'flex',gap:'8px',marginBottom:'8px',fontSize:'11px',fontWeight:'700'}},
            h('span',{style:{color:'#22c55e'}},'+'+prev.entradas.length+' entradas · '+fmt(prev.entradas.reduce((s,e)=>s+e.valor,0))),
            h('span',{style:{color:'#ef4444'}},'-'+prev.saidas.length+' saídas · '+fmt(prev.saidas.reduce((s,e)=>s+e.valor,0)))
          ),
          ...[...prev.entradas.map((it,idx)=>h('div',{className:'prev-row'},
            h('button',{style:{flex:'none',background:'rgba(34,197,94,.2)',color:'#86efac',padding:'4px 8px',borderRadius:'6px',fontSize:'10px',fontWeight:'700',border:'none'},on:{click:()=>{
              S.importPreview.saidas.push({...it});
              S.importPreview.entradas.splice(idx,1);
              render();
            }}},'+ '+fmt(it.valor)+' ⇄'),
            h('span',{style:{flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},it.desc),
            h('span',{className:'pill'},it.cat||'?')
          )),
          ...prev.saidas.map((it,idx)=>h('div',{className:'prev-row'},
            h('button',{style:{flex:'none',background:'rgba(239,68,68,.2)',color:'#fca5a5',padding:'4px 8px',borderRadius:'6px',fontSize:'10px',fontWeight:'700',border:'none'},on:{click:()=>{
              S.importPreview.entradas.push({...it});
              S.importPreview.saidas.splice(idx,1);
              render();
            }}},'- '+fmt(it.valor)+' ⇄'),
            h('span',{style:{flex:'1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},it.desc),
            h('span',{className:'pill'},it.cat||'?')
          ))
          ]
        ) : h('div',{style:{fontSize:'11px',color:'var(--text3)',textAlign:'center',padding:'12px'}},'Selecione um arquivo pra ver o preview'),
        h('div',{className:'row'},
          h('button',{className:'btn btn-o',style:{flex:'1',padding:'12px',opacity:prev?'1':'0.4'},on:{click:()=>{if(prev)commitImport()}}},
            prev?`Importar ${(prev.entradas.length+prev.saidas.length)} transações`:'Importar'),
          h('button',{className:'btn',style:{flex:'1',padding:'12px',background:'var(--bg)',color:'var(--text3)'},on:{click:()=>{S.modal=null;S.importPreview=null;S.importTxt='';S.importFileName='';render()}}},'Cancelar')
        )
      )
    );app.append(md);
  }

  app.append(h('button',{className:'fab',style:{background:'#ef4444'},on:{click:()=>{
    if(confirm('Zerar TODOS os dados?')){S.ent=[];S.sai=[];S.metas=[];S.aquisicao={nome:'',valor:0,mensal:Array(12).fill(0)};
    S.inv=Array.from({length:12},()=>({renda:0,investido:0,onde:''}));save();render()}}}},'🗑'));
}

// ─── Init ───
await initNotif();
render();
await scheduleSmartReminders();

if(isNative && BancoNotif){
  await refreshBankNotifs();
  try{
    BancoNotif.addListener && BancoNotif.addListener('newBankNotif', refreshBankNotifs);
  }catch(e){}
}

if(!isNative && 'serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
</body>
</html>
