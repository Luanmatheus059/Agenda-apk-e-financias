// Snippet apêndice ao android/app/build.gradle pra produzir APK release assinado.
// Aplicado pelo workflow CI após `cap add android`.
// A keystore vive em <repo-root>/keystore/release.jks
android {
    signingConfigs {
        release {
            storeFile file("../../../keystore/release.jks")
            storePassword "luan2026apps"
            keyAlias "luan-apps"
            keyPassword "luan2026apps"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            zipAlignEnabled true
        }
    }
}
